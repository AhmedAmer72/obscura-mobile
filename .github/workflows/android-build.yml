name: Android build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      signing: disabled

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Prepare production env
        run: cp config/mobile.production.env .env.production

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — release AAB will be skipped."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/obscura-release.keystore
          echo "signing=enabled" >> "$GITHUB_ENV"
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/obscura-release.keystore

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Build signed release (AAB + APK)
        if: env.signing == 'enabled'
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: obscura-mobile-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: env.signing == 'enabled'
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: obscura-mobile-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: env.signing == 'enabled'
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: obscura-mobile-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-${{ github.run_number }}
          name: Obscura Mobile v1.0.${{ github.run_number }}
          body: |
            ## Downloads

            | File | Use |
            |------|-----|
            | `app-debug.apk` | Side-load testing (unknown sources) |
            | `app-release.aab` | **Upload to Google Play Console** (when signing secrets are configured) |
            | `app-release.apk` | Signed release for direct install |

            If `app-release.aab` is missing, add Android signing secrets — see **PLAY_STORE.md**.

            - Commit: ${{ github.sha }}
            - Version code: ${{ github.run_number }}
            - Version name: 1.0.${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
